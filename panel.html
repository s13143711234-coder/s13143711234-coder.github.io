  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}
function fmtPrice(v){ return num(v)?'<span class="none">—</span>':`<span class="price">${v.toFixed(v>=100?2:3)}</span>`; }
function fmtCap(v){
  if(num(v)) return '<span class="none">—</span>';
  if(v>=10000) return `${(v/10000).toFixed(2)}<span class="unit">万亿</span>`;
  return `${Math.round(v).toLocaleString('zh-CN')}<span class="unit">亿</span>`;
}
function rowHtml(d, showSectorTag){
  return `<tr>
    <td><span class="name">${d.name}</span><span class="tag">${d.code}</span>${showSectorTag?`<span class="tag">${d.sector}</span>`:''}</td>
    <td>${d.mkt}</td>
    <td class="num">${fmtPrice(d.price)}</td>
    <td class="num">${fmtCap(d.cap)}</td>
    <td class="num">${fmtPct(d.chg1d)}</td>
    <td class="num">${fmtPct(d.chg7d)}</td>
  </tr>`;
}
const COLS = `<colgroup><col class="c-name"><col class="c-mkt"><col class="c-price"><col class="c-cap"><col class="c-1d"><col class="c-7d"></colgroup>`;
function theadFlat(){
  const arrow = k => sortKey===k ? (sortDir>0?' ▲':' ▼') : '';
  return `<thead><tr>
    <th data-k="name">公司 / 代码 / 板块${arrow('name')}</th>
    <th data-k="mkt">市场${arrow('mkt')}</th>
    <th class="num" data-k="price">最新价${arrow('price')}</th>
    <th class="num" data-k="cap">总市值${arrow('cap')}</th>
    <th class="num" data-k="chg1d">近1日${arrow('chg1d')}</th>
    <th class="num" data-k="chg7d">近7日${arrow('chg7d')}</th></tr></thead>`;
}
const theadGroup = `<thead><tr>
    <th>公司 / 代码</th><th>市场</th><th class="num">最新价</th>
    <th class="num">总市值</th><th class="num">近1日</th><th class="num">近7日</th></tr></thead>`;

function filtered(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  return DATA.filter(d=>{
    if(sectorFilter && d.sector!==sectorFilter) return false;
    if(q && !(d.name.toLowerCase().includes(q)||d.code.toLowerCase().includes(q))) return false;
    return true;
  });
}
function renderChips(){
  const box = document.getElementById('chips');
  const mk = (label, key, av, active)=>{
    const cls = num(av)?'flat':(av>0?'up':'down');
    const txt = num(av)?'':`<b class="${cls}">${(av>0?'+':'')+av.toFixed(2)}%</b>`;
    return `<div class="chip ${active?'active':''}" data-s="${key}">${label}${txt}</div>`;
  };
  let html = mk('全部','', avg(DATA.filter(d=>!num(d.chg7d)).map(d=>d.chg7d)), sectorFilter==='');
  SECTORS.forEach(s=>{
    const av = avg(DATA.filter(d=>d.sector===s && !num(d.chg7d)).map(d=>d.chg7d));
    html += mk(s, s, av, sectorFilter===s);
  });
  box.innerHTML = html;
  box.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{ sectorFilter=c.dataset.s; render(); }));
}
function renderSectorView(rows){
  const order = sectorFilter ? [sectorFilter] : SECTORS;
  let html='';
  order.forEach(s=>{
    const items = rows.filter(d=>d.sector===s);
    if(!items.length) return;
    items.sort((a,b)=>{ if(num(a.chg7d))return 1; if(num(b.chg7d))return -1; return b.chg7d-a.chg7d; });
    const a1=avg(items.filter(d=>!num(d.chg1d)).map(d=>d.chg1d));
    const a7=avg(items.filter(d=>!num(d.chg7d)).map(d=>d.chg7d));
    const cl=v=>num(v)?'flat':(v>0?'up':'down'); const f=v=>num(v)?'—':((v>0?'+':'')+v.toFixed(2)+'%');
    html += `<div class="sector">
      <div class="shead">
        <span class="sn">${s}</span><span class="cnt">${items.length} 家</span>
        <span class="sav">平均近1日<span class="${cl(a1)}">${f(a1)}</span> ｜ 平均近7日<span class="${cl(a7)}">${f(a7)}</span></span>
      </div>
      <table>${COLS}${theadGroup}<tbody>${items.map(d=>rowHtml(d,false)).join('')}</tbody></table>
    </div>`;
  });
  return html || '<p class="none" style="margin-top:20px">无匹配结果</p>';
}
function renderFlatView(rows){
  rows = rows.slice().sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==='name'||sortKey==='mkt'){ x=x||''; y=y||''; return x.localeCompare(y,'zh')*sortDir; }
    if(num(x))return 1; if(num(y))return -1; return (x-y)*sortDir;
  });
  return `<table style="border-radius:8px">${COLS}${theadFlat()}<tbody>${rows.map(d=>rowHtml(d,true)).join('')}</tbody></table>`;
}
function render(){
  renderChips();
  const rows = filtered();
  document.getElementById('content').innerHTML = (view==='sector') ? renderSectorView(rows) : renderFlatView(rows);
  document.getElementById('shownCount').textContent = `显示 ${rows.length} / ${DATA.length} 家`;
  if(view==='flat'){
    document.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{
      const k=th.dataset.k;
      if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=(k==='name'||k==='mkt')?1:-1; }
      render();
    }));
  }
}
function stats(){
  const v1 = DATA.filter(d=>!num(d.chg1d)).map(d=>d.chg1d);
  const v7 = DATA.filter(d=>!num(d.chg7d)).map(d=>d.chg7d);
  document.getElementById('cTotal').textContent = DATA.length;
  document.getElementById('cUp').textContent = v1.filter(x=>x>0).length;
  document.getElementById('cDown').textContent = v1.filter(x=>x<0).length;
  const set=(id,v)=>{const e=document.getElementById(id); if(num(v)){e.textContent='-';return;} e.textContent=(v>0?'+':'')+v.toFixed(2)+'%'; e.className='v '+(v>0?'up':(v<0?'down':''));};
  set('cAvg1',avg(v1)); set('cAvg7',avg(v7));
}
document.getElementById('q').addEventListener('input',render);
document.getElementById('viewBtn').addEventListener('click',function(){
  view = (view==='sector')?'flat':'sector';
  this.textContent = (view==='sector')?'切换：按涨幅平铺':'切换：按板块分组';
  render();
});
stats(); render();
</script>
</body>
</html>
