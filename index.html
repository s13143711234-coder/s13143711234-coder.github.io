<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>锂电储能研究工作台</title>
<style>
  html,body { margin:0; height:100%; background:#0f2747; font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif; overflow:hidden; }
  .tabbar { display:flex; align-items:center; gap:6px; height:46px; padding:0 24px; box-sizing:border-box; background:#0f2747; }
  .tabbar .brand { font-weight:700; color:#fff; font-size:14px; margin-right:18px; white-space:nowrap; }
  .tabbar button { background:transparent; border:none; color:#cdddf3; padding:7px 16px; border-radius:7px; font-size:13px; cursor:pointer; font-family:inherit; }
  .tabbar button:hover { background:rgba(255,255,255,.12); color:#fff; }
  .tabbar button.active { background:#2f6fed; color:#fff; font-weight:600; }
  .frames { position:absolute; top:46px; left:0; right:0; bottom:0; }
  iframe { border:none; width:100%; height:100%; display:none; background:#e8f1fb; }
  iframe.show { display:block; }
</style>
</head>
<body>
<div class="tabbar">
  <span class="brand">⚡ 锂电储能研究工作台</span>
  <button id="t1" class="active" onclick="show(1)">📊 盯盘面板</button>
  <button id="t2" onclick="show(2)">🔍 机会扫描</button>
</div>
<div class="frames">
  <iframe id="f1" class="show" src="panel.html"></iframe>
  <iframe id="f2" src="scan.html"></iframe>
</div>
<script>
function show(n){
  document.getElementById('f1').className = n===1?'show':'';
  document.getElementById('f2').className = n===2?'show':'';
  document.getElementById('t1').className = n===1?'active':'';
  document.getElementById('t2').className = n===2?'active':'';
}
</script>
</body>
</html>
